<app-task-form></app-task-form>
<div class="task-list-card">
  <h2>Task List</h2>
  <ul>
    <li *ngFor="let task of tasks">
      <span *ngIf="editingTaskId !== task.taskId" class="task-title">
        {{ task.title }}
      </span>

      <input *ngIf="editingTaskId === task.taskId" name="editTitle" [(ngModel)]="task.title" />

      <button *ngIf="editingTaskId === task.taskId" name="saveButton" (click)="onSave(task)">Save</button>

      <button
          type="button"
          class="status-button"
          [ngClass]="{
            'status-active': getStatusLabel(task.status) === 'Active',
            'status-in-progress': getStatusLabel(task.status) === 'InProgress'
          }"
          (click)="onStatusChange(task)">
          Status: {{ getStatusLabel(task.status) }}
      </button>

      <div class="task-detail">
        <span class="task-detail-label">Priority: </span>
        <span>{{ getPriorityLabel(task.priorityLevel) }}</span>
      </div>

      <div *ngIf="task.nextAction" class="task-detail">
        <span class="task-detail-label">Next Action: </span>
        <span>{{ task.nextAction }}</span>
      </div>

      <div *ngIf="task.progressLogs && task.progressLogs.length > 0" class="task-detail">
        <div>
          <span class="task-detail-label">Progress Log: </span>
        </div>
        <div *ngFor="let log of task.progressLogs" class="progress-log-entry">
          {{ log.text || log.entryText }}
        </div>
      </div>

      <button (click)="onEdit(task)">Edit</button>
      <button (click)="onDelete(task)">Delete</button>

      <button name="addProgressLogButton" (click)="onAddProgressLog(task)">Add Progress Log</button>
      <input *ngIf="progressLogTaskId === task.taskId" name="progressLogInput" [(ngModel)]="progressLogText" />

      <button *ngIf="progressLogTaskId === task.taskId" name="saveProgressLogButton" (click)="onSaveProgressLog(task)">Save Progress Log</button>

    </li>
  </ul>

  <p *ngIf="tasks.length === 0">No active tasks</p>
</div>
