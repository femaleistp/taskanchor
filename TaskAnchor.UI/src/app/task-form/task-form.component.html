<div class="task-form-card">
  <h2>Create Task</h2>

  <form (submit)="onSubmit()">
    <label for="title">Title</label>
    <input id="title" name="title" [(ngModel)]="title" />

    <label for="description">Description</label>
    <textarea id="description" name="description" [(ngModel)]="description"></textarea>

    <label for="priorityLevel">Priority</label>
    <select id="priorityLevel" name="priorityLevel" [(ngModel)]="priorityLevel">
      <option value="Low">Low</option>
      <option value="Medium">Medium</option>
      <option value="High">High</option>
    </select>

    <label for="dueDate">Due Date</label>
    <input id="dueDate" name="dueDate" type="date" [(ngModel)]="dueDate" />

    <label for="nextAction">NextAction</label>
    <input id="nextAction" name="nextAction" [(ngModel)]="nextAction" />

    <p class="task-form-error" *ngIf="taskFormError">
      {{ taskFormError }}
    </p>

    <button type="submit">Create Task</button>
  </form>
</div>
